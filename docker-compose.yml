services:
  postgres:
    image: postgres:16
    container_name: omniops-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: omniops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: omniops-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: omniops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: omniops-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: omniops-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ---- application tier ----
  # api and worker share one image and one uploads volume: the API writes the
  # uploaded file to disk, the worker reads it back during ingestion.

  api:
    build: ./backend
    container_name: omniops-api
    env_file:
      - path: ./backend/.env
        required: false
    environment: &app_env
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/omniops
      ELASTICSEARCH_URL: http://elasticsearch:9200
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/storage/uploads
      HF_HOME: /models
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/storage/uploads
      - hf_models:/models
    depends_on:
      postgres: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
      qdrant: { condition: service_started }
      redis: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: ./backend
    container_name: omniops-worker
    command: celery -A app.core.celery_app worker --loglevel=info --pool=solo
    env_file:
      - path: ./backend/.env
        required: false
    environment: *app_env
    volumes:
      - uploads:/app/storage/uploads
      - hf_models:/models
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }

  web:
    build:
      context: ./frontend
      args:
        # Baked in at build time and used by the browser, so it must be the
        # host-published API port, not the compose service name.
        NEXT_PUBLIC_API_BASE: http://localhost:8000
    container_name: omniops-web
    ports:
      - "3000:3000"
    depends_on:
      api: { condition: service_started }

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  minio_data:
  es_data:
  uploads:
  hf_models:
